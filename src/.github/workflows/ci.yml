name: CI - Build & Test

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

jobs:

  build-and-test:


    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4


      - name: Installation de Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'


      - name: Cache des dépendances Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Lancement des tests
        run: mvn test -B

      - name: Package de l'application
        run: mvn package -DskipTests -B


      - name: Sauvegarde du .jar comme artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-websocket-jar
          path: target/*.jar
          retention-days: 5
