name: CI WebSocket

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Execution des tests unitaires
        run: mvn test -B

      - name: Compilation et Packaging
        run: mvn package -DskipTests -B

      - name: Publication du rapport de tests
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: target/surefire-reports/
          retention-days: 5

      - name: Upload du JAR
        uses: actions/upload-artifact@v4
        with:
          name: sgae-api
          path: target/*.jar
          retention-days: 5