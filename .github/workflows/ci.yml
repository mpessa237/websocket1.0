name: CI WebSocket

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Tests + couverture JaCoCo
        run: mvn verify -B

      - name: Analyse SonarCloud
        run: |
          mvn sonar:sonar -B \
          -Dsonar.projectKey=mpessa237_websocket1.0 \
          -Dsonar.organization=mpessa237 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ secrets.SONAR_TOKENS }} \
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


      - name: Publication du rapport JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: rapport-jacoco
          path: target/site/jacoco/
          retention-days: 5


      - name: Publication du rapport de tests
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: target/surefire-reports/
          retention-days: 5

      - name: Upload du JAR
        uses: actions/upload-artifact@v4
        with:
          name: sgae-api
          path: target/*.jar
          retention-days: 5