name: CI WebSocket
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compilation et Packaging (SANS TESTS)
        run: mvn clean package -DskipTests
      - name: Upload du JAR (Artefact)
        uses: actions/upload-artifact@v4
        with:
          name: sgae-api
          path: target/*.jar
